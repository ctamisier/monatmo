<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <radialGradient id="space">
            <stop offset="0" stop-color="#304FFE"/>
            <stop offset=".45" stop-color="#5B2C83"/>
            <stop offset="1" stop-color="#050817"/>
        </radialGradient>

        <radialGradient id="nebula">
            <stop stop-color="#00E5FF" stop-opacity=".75"/>
            <stop offset=".5" stop-color="#9C27FF" stop-opacity=".4"/>
            <stop offset="1" stop-color="#FF4081" stop-opacity="0"/>
        </radialGradient>

        <linearGradient id="house" x2="1" y2="1">
            <stop stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#B8EFFF"/>
        </linearGradient>

        <filter id="blur">
            <feGaussianBlur stdDeviation="18"/>
        </filter>
    </defs>

    <!-- Univers -->
    <rect width="512" height="512" rx="120" fill="url(#space)"/>

    <!-- Nébuleuse -->
    <ellipse cx="150" cy="150" rx="170" ry="110"
             fill="url(#nebula)" filter="url(#blur)"/>
    <ellipse cx="370" cy="340" rx="160" ry="120"
             fill="url(#nebula)" filter="url(#blur)"/>

    <!-- Etoiles -->
    <g fill="white">
        <circle cx="90" cy="100" r="4"/>
        <circle cx="410" cy="110" r="3"/>
        <circle cx="430" cy="250" r="3"/>
        <circle cx="110" cy="330" r="2"/>
        <circle cx="350" cy="80" r="2"/>
    </g>

    <!-- Maison -->
    <path d="M145 260L256 155L367 260V385
           Q367 410 342 410H170
           Q145 410 145 385Z"
          fill="url(#house)"/>

    <!-- Toit -->
    <path d="M125 260L256 135L387 260"
          fill="none"
          stroke="white"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Porte -->
    <rect x="225" y="315" width="62" height="95"
          rx="14"
          fill="#10152F"/>

    <!-- Fenêtres -->
    <rect x="175" y="285" width="45" height="45" rx="10"
          fill="#00E5FF"/>
    <rect x="292" y="285" width="45" height="45" rx="10"
          fill="#00E5FF"/>

    <!-- Capteur domotique -->
    <circle cx="256" cy="245" r="45" fill="#10152F"/>
    <circle cx="256" cy="245" r="20" fill="#00E5FF"/>

    <!-- Signal connecté -->
    <path d="M215 205 Q256 165 297 205"
          fill="none"
          stroke="#00E5FF"
          stroke-width="7"
          stroke-linecap="round"/>

    <path d="M195 175 Q256 115 317 175"
          fill="none"
          stroke="#00E5FF"
          stroke-width="5"
          opacity=".45"
          stroke-linecap="round"/>
</svg>